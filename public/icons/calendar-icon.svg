<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#5A6E5A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Calendar body -->
  <rect x="10" y="18" width="80" height="72" rx="8"/>
  <!-- Top bar -->
  <line x1="10" y1="38" x2="90" y2="38"/>
  <!-- Hanger left -->
  <line x1="30" y1="10" x2="30" y2="26"/>
  <!-- Hanger right -->
  <line x1="70" y1="10" x2="70" y2="26"/>
  <!-- Dots row 1 -->
  <circle cx="30" cy="53" r="3" fill="#5A6E5A" stroke="none"/>
  <circle cx="50" cy="53" r="3" fill="#5A6E5A" stroke="none"/>
  <circle cx="70" cy="53" r="3" fill="#5A6E5A" stroke="none"/>
  <!-- Dots row 2 -->
  <circle cx="30" cy="70" r="3" fill="#5A6E5A" stroke="none"/>
  <circle cx="50" cy="70" r="3" fill="#5A6E5A" stroke="none"/>
  <circle cx="70" cy="70" r="3" fill="#5A6E5A" stroke="none"/>
</svg>
